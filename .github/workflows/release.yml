---
name: Release

'on':
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: simbo/changes-between-tags-action@v1
        id: changes
        with:
          line-prefix: '* '

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.changes.outputs.tag }}
          body: |
            ## Changelog (since ${{ steps.changes.outputs.ref }})
            ${{ steps.changes.outputs.changes }}
          make_latest: true
